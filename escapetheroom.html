<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">


<div id="desktop-icons">
  <div class="icon-wrapper" id="launch-cmd">
    <img src="cmd_icon.png" alt="CMD" onerror="this.src='https://cdn-icons-png.flaticon.com/512/606/606548.png'">
    <span>system</span>
  </div>
</div>

<style>

*{margin:0;padding:0;box-sizing:border-box}
body{background:#000}
#matrix-wrap{position:relative;width:100%;min-height:600px;height:100%;background:#000;font-family:'Courier New',monospace;overflow:hidden;border-radius:6px}
#matrix-canvas{position:absolute;top:0;left:0;width:100%;height:100%;opacity:.85}
#terminal{display:none;position:absolute;background:rgba(0,0,0,.82);border:1px solid #1a5c1a;border-radius:4px;box-shadow:0 0 0 1px #0d3d0d,inset 0 0 40px rgba(0,0,0,.8);flex-direction:column;overflow:hidden;z-index:9999}
#term-bar{background:#0a1a0a;border-bottom:1px solid #1a5c1a;padding:7px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.dot{width:10px;height:10px;border-radius:50%;cursor:pointer;transition:filter .2s}
.dot:hover{filter:brightness(1.5)}
.dot-r{background:#2a0a0a;border:1px solid #3a1a1a}
.dot-y{background:#1a1a0a;border:1px solid #2a2a0a}
.dot-g{background:#0a2a0a;border:1px solid #1a4a1a}
#term-title{color:#2a7a2a;font-size:11px;letter-spacing:2px;text-transform:uppercase;flex:1;text-align:center}
#term-output{flex:1;padding:14px 18px;overflow-y:auto;color:#00cc00;font-size:13px;line-height:1.7;scrollbar-width:thin;scrollbar-color:#1a5c1a #000;word-wrap:break-word;overflow-wrap:break-word;white-space:pre-wrap}
#term-output::-webkit-scrollbar{width:5px}
#term-output::-webkit-scrollbar-track{background:#000}
#term-output::-webkit-scrollbar-thumb{background:#1a5c1a;border-radius:2px}
.line-sys{color:#009900}.line-user{color:#00ff66}.line-err{color:#4a4a4a}.line-dim{color:#005500}.line-bright{color:#00ff00;font-weight:bold}
#term-input-row{display:flex;align-items:center;padding:8px 18px 12px;border-top:1px solid #0d3d0d;background:rgba(0,10,0,.6);flex-shrink:0;gap:6px}
#prompt-label{color:#00aa00;font-size:13px;white-space:nowrap;font-family:'Courier New',monospace}
#term-input{flex:1;background:transparent;border:none;outline:none;color:#00ff66;font-size:13px;font-family:'Courier New',monospace;caret-color:#0f0}
#term-input::placeholder{color:#1a4a1a}
.cursor-blink{display:inline-block;width:7px;height:14px;background:#00cc00;animation:blink 1s step-end infinite;vertical-align:text-bottom;margin-left:1px}
@keyframes blink{50%{opacity:0}}
.scan-line{position:absolute;top:0;left:0;right:0;height:2px;background:rgba(0,255,0,.04);animation:scan 6s linear infinite;pointer-events:none}
@keyframes scan{to{top:100%}}
#desktop-icons{position:absolute;top:40px;left:40px;z-index:5;display:flex;flex-direction:column;align-items:center;gap:20px}
.icon-wrapper{width:80px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;transition:transform .2s,filter .2s;user-select:none}
.icon-wrapper:hover{transform:scale(1.1);filter:drop-shadow(0 0 10px rgba(0,255,102,.5))}
.icon-wrapper img{width:50px;height:50px;object-fit:contain}
.icon-wrapper span{color:#00ff66;font-size:12px;text-shadow:1px 1px 2px #000;text-align:center}
#terminal.fullscreen{border-radius:0;border:none;z-index:9999}
#terminal.state-window,#terminal.state-minimized{position:absolute;width:min(720px,90%);transform:translate(-50%,-50%)}
#terminal.state-window{height:480px}#terminal.state-minimized{height:40px}
@media(max-width:600px){
  #terminal{position:fixed!important;width:92vw!important;height:80vh!important;left:4vw!important;top:50px!important;transform:none!important}
  #term-output{font-size:11px;padding:10px}
  #desktop-icons{top:auto!important;bottom:30px!important;left:50%!important;transform:translateX(-50%) scale(.9)!important;flex-direction:row!important}
}

</style>

<div id="matrix-wrap">
  <canvas id="matrix-canvas"></canvas>
  <div class="scan-line"></div>
  <div id="terminal">
    <div id="term-bar">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
      <span id="term-title">THE TERMINAL v1.0</span>
    </div>
    <div id="term-output"></div>
    <div id="term-input-row">
      <span id="prompt-label">root@matrix:~$</span>
      <input type="text" id="term-input" placeholder="type here..." autocomplete="off" spellcheck="false" />
    </div>
  </div>
</div>

<script>
(  
  function(){
  const canvas = document.getElementById('matrix-canvas');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('matrix-wrap');
  const output = document.getElementById('term-output');
  const input = document.getElementById('term-input');
  
  const term = document.getElementById('terminal');
  const dotRed = document.querySelector('.dot-r');
  const dotYellow = document.querySelector('.dot-y');
  const dotGreen = document.querySelector('.dot-g');
  
  const launchBtn = document.getElementById('launch-cmd');
  const termBar = document.getElementById('term-bar');

  const WIN_W = 720;
  const WIN_H = 480;
  const WIN_H_MIN = 40;

  let termState = 'closed';
  let winX = 0, winY = 0; // posizione corrente in px relativi a wrap

  function centerWindow() {
    winX = Math.max(0, (wrap.offsetWidth - Math.min(WIN_W, wrap.offsetWidth * 0.9)) / 2);
    winY = Math.max(0, (wrap.offsetHeight - WIN_H) / 2);
  }

// Funzione universale per l'apertura
function handleOpen() {
    if (termState !== 'closed') return;
    centerWindow();
    applyState('window');

    if (output.innerHTML === '') {
        writeLine('Microsoft Matrix(TM) [Version 1.0.1999]', 'line-dim', 100);
        writeLine('(c) Corporation. All rights reserved. Language: ENGLISH', 'line-dim', 100);
        writeLine('&nbsp;', '', 100);
    }
}

// PC: Solo doppio click
launchBtn.addEventListener('dblclick', handleOpen);

// MOBILE: Singolo tocco (usiamo touchend per massima compatibilità)
launchBtn.addEventListener('touchend', (e) => {
    e.preventDefault(); // Impedisce che il browser simuli anche un click standard
    handleOpen();
});

function applyState(state) {
  const inputRow = document.getElementById('term-input-row');
    const isMobile = window.innerWidth <= 600;
    const isMinimized = state.startsWith('minimized-from-');

    // reset
    term.style.cssText = '';
    term.className = '';

    // stili fissi sempre presenti
    term.style.position = 'absolute';
    term.style.background = 'rgba(0, 0, 0, 0.82)';
    term.style.border = '1px solid #1a5c1a';
    term.style.borderRadius = '4px';
    term.style.boxShadow = '0 0 0 1px #0d3d0d, inset 0 0 40px rgba(0,0,0,0.8)';
    term.style.flexDirection = 'column';
    term.style.overflow = 'hidden';
    term.style.opacity = '1';
    term.style.transition = '';

    if (state === 'closed') {
      term.style.display = 'none';
      termState = state;
      return;
    }

    term.style.display = 'flex';
    output.style.display = isMinimized ? 'none' : 'block';
    inputRow.style.display = isMinimized ? 'none' : 'flex';

    if (state === 'fullscreen') {
      term.classList.add('fullscreen');
      term.style.left = '0px';
      term.style.top = '0px';
      term.style.width = '100vw';
      term.style.height = '100vh';
      term.style.zIndex = '9999';
      term.style.borderRadius = '0';
      term.style.border = 'none';

    } else if (isMobile) {
      // su mobile: posizione fissa semplice, niente drag
      term.style.position = 'fixed';
      term.style.left = '4vw';
      term.style.top = '50px';
      term.style.width = '92vw';
      term.style.height = isMinimized ? WIN_H_MIN + 'px' : '80vh';

    } else {
      // window o minimized su desktop
      const w = Math.min(WIN_W, wrap.offsetWidth * 0.9);
      term.style.left = winX + 'px';
      term.style.top = winY + 'px';
      term.style.width = w + 'px';
      term.style.height = isMinimized ? WIN_H_MIN + 'px' : WIN_H + 'px';
    }

    termState = state;
    if (!isMinimized) input.focus();
  }

// ROSSO: chiude
dotRed.addEventListener('click', () => {
  term.style.transition = 'opacity 0.4s ease';
  term.style.opacity = '0';
  setTimeout(() => applyState('closed'), 400);
});

// GIALLO: minimizza / ripristina
dotYellow.addEventListener('click', () => {
  if (termState === 'window')                  applyState('minimized-from-window');
  else if (termState === 'fullscreen')         applyState('minimized-from-fullscreen');
  else if (termState === 'minimized-from-window')     applyState('window');
  else if (termState === 'minimized-from-fullscreen') applyState('fullscreen');
});

// VERDE: fullscreen / ripristina finestra
dotGreen.addEventListener('click', () => {
  if (termState === 'window')                         applyState('fullscreen');
  else if (termState === 'fullscreen')                applyState('window');
  else if (termState.startsWith('minimized-from-'))   applyState('fullscreen');
  setTimeout(resize, 100);
});
  
  /*dotRed.addEventListener('mouseenter', () => {
    // Stampiamo il messaggio di avvertimento
    writeLine(' <br> <span style="color:red; font-weight:bold;"> Uh uh... stay with me.</span> <br>', 'line-bright', 0);
  });*/

  let dragging = false, dragOffX = 0, dragOffY = 0;

termBar.addEventListener('mousedown', (e) => {
  if (termState === 'fullscreen' || termState === 'closed' || window.innerWidth <= 600) return;
  if (e.target.classList.contains('dot')) return;
  dragging = true;
  dragOffX = e.clientX - term.getBoundingClientRect().left;
  dragOffY = e.clientY - term.getBoundingClientRect().top;
  term.style.transition = 'none';
  termBar.style.cursor = 'grabbing';
  e.preventDefault();
});

termBar.addEventListener('touchstart', (e) => {
  if (termState === 'fullscreen' || termState === 'closed' || window.innerWidth <= 600) return;
  if (e.target.classList.contains('dot')) return;
  dragging = true;
  const t = e.touches[0];
  dragOffX = t.clientX - term.getBoundingClientRect().left;
  dragOffY = t.clientY - term.getBoundingClientRect().top;
  term.style.transition = 'none';
}, { passive: true });

document.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const rect = wrap.getBoundingClientRect();
  winX = e.clientX - rect.left - dragOffX;
  winY = e.clientY - rect.top - dragOffY;
  winX = Math.max(0, Math.min(winX, wrap.offsetWidth - term.offsetWidth));
  winY = Math.max(0, Math.min(winY, wrap.offsetHeight - term.offsetHeight));
  term.style.left = winX + 'px';
  term.style.top = winY + 'px';
});

document.addEventListener('touchmove', (e) => {
  if (!dragging) return;
  const t = e.touches[0];
  const rect = wrap.getBoundingClientRect();
  winX = t.clientX - rect.left - dragOffX;
  winY = t.clientY - rect.top - dragOffY;
  winX = Math.max(0, Math.min(winX, wrap.offsetWidth - term.offsetWidth));
  winY = Math.max(0, Math.min(winY, wrap.offsetHeight - term.offsetHeight));
  term.style.left = winX + 'px';
  term.style.top = winY + 'px';
}, { passive: true });

document.addEventListener('mouseup', () => {
  dragging = false;
  termBar.style.cursor = '';
});
document.addEventListener('touchend', () => { dragging = false; });

  const CHARS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&*';

  let W, H, cols, drops;
 function resize() {
  const newW = wrap.offsetWidth;
  const newH = wrap.offsetHeight;
  
  // Applichiamo le dimensioni solo se sono effettivamente cambiate
  if (canvas.width !== newW || canvas.height !== newH) {
    canvas.width = newW;
    canvas.height = newH;
    W = newW;
    H = newH;
    
    const fontSize = 14;
    const newCols = Math.floor(W / fontSize);

    if (!drops) {
      drops = new Array(newCols).fill(1).map(() => Math.random() * -50);
    } else {
      // Se mancano colonne, le aggiungiamo in modo fluido
      while (drops.length < newCols) {
        drops.push(Math.random() * -50);
      }
    }
    cols = newCols;
  }

  if (termState !== 'closed' && input) {
    input.focus();
  }
}
  resize();
  window.addEventListener('resize', resize);

  const fontSize = 14;
  function drawMatrix() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, W, H);
    for (let i = 0; i < cols; i++) {
      const ch = CHARS[Math.floor(Math.random() * CHARS.length)];
      const x = i * fontSize;
      const y = drops[i] * fontSize;
      const norm = (drops[i] * fontSize) / H;
      if (Math.random() < 0.03) {
        ctx.fillStyle = '#ffffff';
      } else if (Math.random() < 0.08) {
        ctx.fillStyle = '#00ff00';
      } else {
        const g = Math.floor(80 + 100 * (1 - norm));
        ctx.fillStyle = `rgb(0,${g},0)`;
      }
      ctx.font = `${fontSize}px monospace`;
      ctx.fillText(ch, x, y);
      if (y > H && Math.random() > 0.975) drops[i] = 0;
      drops[i] += 0.5 + Math.random() * 0.5;
    }
  }
  setInterval(drawMatrix, 40);

  let typingTimer = null;
  function writeLine(text, cls, delay) {
    return new Promise(resolve => {
      setTimeout(() => {
        const div = document.createElement('div');
        div.className = cls || 'line-sys';
        div.innerHTML = text;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
        resolve();
      }, delay || 0);
    });
  }

  async function typeLines(lines) {
    for (let i = 0; i < lines.length; i++) {
      await writeLine(lines[i][0], lines[i][1], i * lines[i][2]);
    }
  }

  async function getBatteryData() {
    if (!navigator.getBattery) return null; // Protezione per Safari/Firefox
    try {
      const batt = await navigator.getBattery();
      return {
        level: Math.round(batt.level * 100),
        charging: batt.charging
      };
    } catch (e) {
      return null;
    }
  }
  
  async function boot() {
    const battery = await getBatteryData();
    const date = new Date();
    const hour = date.getHours();
    const minutes = date.getMinutes().toString().padStart(2, '0');
    
    await writeLine('Initializing connection...', 'line-dim', 700);
    await writeLine('[SYS] Neural link established.', 'line-sys', 1000);
    await writeLine('[SYS] Matrix kernel loaded.', 'line-sys', 900);

    await writeLine('[SYS] Identity: ', 'line-sys', 1000);
    const lines = output.querySelectorAll('div');
    const lastLine = lines[lines.length - 1];
    
    await new Promise(res => setTimeout(res, 1000)); 
    lastLine.innerHTML += '<span style="color:#00ff66">User IDENTIFIED</span>';
    
    if (hour >= 0 && hour < 23) {
      await typeWriter(`<br>It is late. At ${hour}:${minutes} you should be <span style="color:red">sleeping</span> <br> <br>`, 'line-bright', 50, 1000);
    }

    if (battery && battery.level <= 100) {
      await writeLine(`[WAR]: Power level: ${battery.level}%`, 'line-sys', 600);
      typeWriter(' <br> You better charge your device if you do not want to <span style="color:red"> enter the limbo</span> <br>', 'line-bright', 30, 800);
    } else if (battery) {
      await writeLine(`[SYS] Power level: ${battery.level}%`, 'line-sys', 600);
    }
    
    await writeLine('&nbsp;', '', 2000);
    
    await typeWriter('<span class="line-bright">Do not worry now</span>', 'line-bright', 100, 1500);
    await typeWriter('We have you.', 'line-sys', 50, 800);
    await typeWriter('Just follow the pattern.', 'line-dim', 150, 1200);
    await writeLine('&nbsp;', '', 4000);
    await writeLine('[SYSTEM READY] — type a command', 'line-err', 150);
    input.focus();
  }
  //boot();

  window.print = function(text, cls) {
    const div = document.createElement('div');
    div.className = cls || 'line-sys';
    div.innerHTML = text;
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
  };

  window.println = window.print;

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      const val = input.value.trim();
      if (!val) return;
      writeLine('<span style="color:#00aa00">root@matrix:~$</span> ' + val, 'line-user', 0);
      input.value = '';
      handleCommand(val);
    }
  });
  
  function typeWriter(text, cls, speed = 30, delay = 0) {
    return new Promise(resolve => {
      setTimeout(() => {
        const div = document.createElement('div');
        div.className = cls || 'line-sys';
        output.appendChild(div);
        
        let i = 0;
        const interval = setInterval(() => {
          // substring non taglia i tag HTML correttamente, ma per br e span semplici regge
          div.innerHTML = text.substring(0, i) + '<span class="cursor-blink">|</span>';
          i++;
          output.scrollTop = output.scrollHeight;
          
          if (i > text.length) {
            clearInterval(interval);
            div.innerHTML = text; 
            resolve();
          }
        }, speed);
      }, delay); // <--- Questo gestisce l'attesa prima dell'inizio
    });
  }

  function handleCommand(cmd) {
    const c = cmd.toLowerCase();
    switch (c) {
      case "help":
        writeLine('Available commands: \ncl - cleans up the cmd \ncd - change the current directory \nexit - quits the cmd or the current open file. \nls - list directory contents \n\ntype &lt;command&gt; ? to know more', 'line-sys');
      break;
      case "cl":
      case "clear":
        setTimeout(() => {
          output.innerHTML = '';
        }, 10);
      break;
      case "ex":
      case "exit":
        applyState('closed');
      break;
      default:
    }
  }


  input.focus();
})();
</script>
