name: Deploy to Neocities

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4 # Versione aggiornata

    - name: Deploy to Neocities
      uses: bcomnes/deploy-to-neocities@v3 # Versione aggiornata
      with:
        api_token: ${{ secrets.NEOCITIES_API_TOKEN }}
        cleanup: false
        dist_dir: .
